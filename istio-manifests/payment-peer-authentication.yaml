# Zero Trust: Enforce mTLS on paymentservice in PERMISSIVE mode.
# This ensures that sidecar-equipped callers (e.g., checkoutservice) communicate
# via mTLS (encrypted + identity-verified), while still accepting plaintext
# from services without sidecars. Other services are NOT blocked.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: paymentservice-mtls
spec:
  selector:
    matchLabels:
      app: paymentservice
  mtls:
    mode: PERMISSIVE
