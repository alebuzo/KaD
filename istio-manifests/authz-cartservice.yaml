# AuthorizationPolicy - Control de acceso a cartservice
#
# Esta política implementa el principio de MÍNIMO PRIVILEGIO:
# Solo frontend y checkoutservice pueden comunicarse con cartservice.
# Cualquier otro servicio que intente contactar a cartservice será DENEGADO.
#
# Flujos permitidos:
#   frontend --> cartservice        (PERMITIDO)
#   checkoutservice --> cartservice (PERMITIDO)
#
# Flujos bloqueados:
#   adservice --> cartservice       (DENEGADO)
#   emailservice --> cartservice    (DENEGADO)
#   (cualquier otro) --> cartservice (DENEGADO)
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: cartservice-allow-frontend-checkout
  namespace: default
spec:
  selector:
    matchLabels:
      app: cartservice
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
          - "cluster.local/ns/default/sa/frontend"
          - "cluster.local/ns/default/sa/checkoutservice"
